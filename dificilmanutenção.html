<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manutenção</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* FUNDO */

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    font-family:'Press Start 2P', cursive;

    background-image:url("dificil.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

}

/* PAINEL */

.manutencao{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:rgba(18,14,11,.82);

    border:4px solid #4F4638;

    padding:35px 45px;

    width:720px;
    max-width:90%;

    display:flex;
    flex-direction:column;
    align-items:center;

    text-align:center;

    box-shadow:
        0 0 35px rgba(0,0,0,.80);

}

/* TÍTULO */

.manutencao h1{

    margin:0;

    font-size:42px;

    letter-spacing:3px;

    color:#C6AE77;

    text-shadow:
        3px 3px 0 #0A0806,
        0 0 6px rgba(255,180,80,.12);

}

/* TEXTO */

.manutencao p{

    margin-top:30px;

    line-height:2;

    font-size:12px;

    color:#C6AE77;

    text-shadow:
        2px 2px 0 #090705;

}

/* BOTÃO VOLTAR */

.voltar{

    position:fixed;

    bottom:20px;

    right:20px;

}

.voltar button{

    font-family:'Press Start 2P', cursive;

    background:rgba(22,17,13,.88);

    color:#C6AE77;

    border:4px solid #4F4638;

    padding:15px 25px;

    cursor:pointer;

    text-shadow:
        2px 2px 0 #090705;

    box-shadow:
        5px 5px 0 rgba(0,0,0,.70);

    transition:.2s;

}

.voltar button:hover{

    background:rgba(34,27,20,.95);

    border-color:#7A6848;

    color:#E3C98E;

    transform:scale(1.05);

}

</style>

</head>

<body>

<div class="manutencao">

    <h1>EM MANUTENÇÃO</h1>

    <p>

        Estou trabalhando nesta área do currículo.

        <br><br>

        Em breve ela estará disponível!

    </p>

</div>

<div class="voltar">

    <button onclick="window.location.href='index.html'">

        VOLTAR

    </button>

</div>

</body>

</html>
