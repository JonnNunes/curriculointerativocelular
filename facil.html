<style>

html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
}

body{
    font-family:'Press Start 2P', cursive;
    text-align:center;
    color:#C6AE77;

    background-image:url("modosfacil.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;
}

/* TÍTULO */

h1{

    margin-top:30px;
    font-size:18px;

    color:#C6AE77;

    text-shadow:
        3px 3px 0 #0A0806,
        0 0 6px rgba(255,180,80,.12);

}

/* GRID */

.container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
}

/* CARDS */

.card{

    background: rgba(18,14,11,.82);
    border: 4px solid #4F4638;

    width: 100%;
    max-width: 260px;
    height: 220px;
    margin: 0 auto;
    padding: 30px;

    cursor: pointer;

    box-shadow: 0 0 35px rgba(0,0,0,.80);

    transition: .2s;

    position: relative;

    overflow: hidden;

    box-sizing: border-box;

}

/* HOVER DOS CARDS */

.card:hover{

    transform:scale(1.05);

    background:rgba(22,17,13,.90);

    border-color:#7A6848;

}

/* IMAGENS */

.card img{

    position: absolute;

    width: 120px;
    height: 120px;

    left: 50%;
    top: 65%;

    transform: translate(-50%, -50%);

    object-fit: contain;

    image-rendering: pixelated;

    opacity: .75;

    filter: brightness(.75) contrast(1.15);

    pointer-events: none;

}
/* TEXTO */

.card div{

    position: relative;

    z-index: 1;

    margin-top: 0;

    color: #C6AE77;

    text-shadow:
        2px 2px 0 #090705;

}
/* MODAL */

.modal{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.45);

    justify-content:center;

    align-items:center;

    z-index:999;

}

/* JANELA */

.janela{
    background:rgba(18,14,11,.82);
    border:4px solid #4F4638;

    width:90%;
    max-width:750px;
    max-height:90vh;

    overflow-y:auto;

    padding:25px;

    text-align:center;
    color:#C6AE77;

    box-shadow:0 0 35px rgba(0,0,0,.80);
}

/* SKILLS */

.skills-container{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    justify-content:center;

}

.skill{

    border:2px solid #4F4638;

    background:rgba(35,28,22,.85);

    color:#C6AE77;

    padding:7px 12px;

    font-size:10px;

    text-shadow:
        1px 1px 0 #090705;

}

/* BOTÕES */

button{

    font-family:'Press Start 2P', cursive;

    background:rgba(22,17,13,.88);

    color:#C6AE77;

    border:4px solid #4F4638;

    padding:10px 15px;

    cursor:pointer;

    margin-top:15px;

    text-shadow:
        2px 2px 0 #090705;

    box-shadow:
        5px 5px 0 rgba(0,0,0,.70);

    transition:.2s;

}

/* HOVER DOS BOTÕES */

button:hover{

    background:rgba(34,27,20,.95);

    border-color:#7A6848;

    color:#E3C98E;

    transform:scale(1.05);

}

/* VOLTAR */

.voltar{
    position:fixed;
    bottom:15px;
    right:15px;
    z-index:1000;
}

.voltar button{

    background:rgba(22,17,13,.88);

    border:4px solid #4F4638;

}

/* ESCONDER */

.escondido{

    display:none !important;

}
@media (max-width: 768px){

    h1{
        font-size: 12px;
        margin-top: 15px;
    }

    .container{
        grid-template-columns: 1fr;
        padding: 15px;
    }

    .card{

.modal{

    left:0;

    justify-content:center;
